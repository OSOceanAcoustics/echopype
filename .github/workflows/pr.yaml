name: Test PR

on:
  pull_request:
    paths-ignore: ["**/docker.yaml", "docs"]
  push:
    branches:
      - ci/*
  workflow_dispatch:

env:
  NUM_WORKERS: 2
  USE_POOCH: "True"
  ECHOPYPE_DATA_VERSION: v0.11.1a2
  ECHOPYPE_DATA_BASEURL: https://github.com/OSOceanAcoustics/echopype/releases/download/{version}/
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

jobs:
  test:
    name: ${{ matrix.python-version }}--${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    if: ${{ !contains(github.event.pull_request.title, '[skip ci]') }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        runs-on: [ubuntu-latest]
        experimental: [false]

    services:
      # TODO: figure out how to update tag when there's a new one
      minio:
        image: cormorack/minioci:latest
        ports:
          - 9000:9000
      httpserver:
        image: httpd:2.4
        ports:
          - 8080:80

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags.

      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          set -eux
          echo "Before cleanup:"
          df -h
          for p in /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL; do
            if [ -d "$p" ]; then
              echo "Removing $p (size: $(du -sh "$p" | cut -f1))"
              sudo rm -rf "$p"
            else
              echo "Not present: $p"
            fi
          done
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          echo "After cleanup:"
          df -h

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Set environment variables
        run: echo "PYTHON_VERSION=${{ matrix.python-version }}" >> $GITHUB_ENV

      - name: Remove docker-compose python
        run: sed -i "/docker-compose/d" requirements-dev.txt

      - name: Install dev tools
        run: python -m pip install -r requirements-dev.txt

      - name: Cache echopype test data
        uses: actions/cache@v5
        with:
          path: ${{ env.XDG_CACHE_HOME }}/echopype
          key: ep-data-${{ env.ECHOPYPE_DATA_VERSION }}

      - name: Ensure pooch (for GitHub assets)
        run: python -m pip install "pooch>=1.8"

      - name: Install error reporter
        if: ${{ matrix.python-version == '3.13' }}
        run: python -m pip install pytest-github-actions-annotate-failures

      - name: Install echopype
        run: python -m pip install -e ".[plot]"

      - name: Print installed packages
        run: python -m pip list

      - name: Finding changed files
        id: files
        uses: tj-actions/changed-files@v47

      - name: Print Changed files
        run: echo "${{ steps.files.outputs.all_changed_files }}"

      - name: Disk usage (before test data)
        if: runner.os == 'Linux'
        run: |
          set -eux
          df -h
          du -h -d 3 ${{ env.XDG_CACHE_HOME }} || true

      - name: Pre-fetch Pooch test data
        run: |
          pytest --collect-only -q

      - name: Copy test data to MinIO and HTTP server
        run: |
          python .ci_helpers/docker/setup-services.py --deploy --data-only --http-server ${{ job.services.httpserver.id }}

          # Check data endpoint
          curl http://localhost:8080/data/

      - name: Disk usage (after services deploy)
        if: runner.os == 'Linux'
        run: |
          set -eux
          df -h
          du -h -d 3 ${{ env.XDG_CACHE_HOME }} || true
          docker system df || true

      - name: Running all tests with memory tracking
        run: |
          (
            echo "timestamp,rss_mb" > memory_usage.csv
            while true; do
              ts=$(date +%s)
              rss_kb=$(ps -C python -o rss= | awk '{s+=$1} END {print s+0}')
              rss_mb=$(awk "BEGIN {printf \"%.2f\", ${rss_kb}/1024}")
              echo "${ts},${rss_mb}" >> memory_usage.csv

              echo "===== $(date) =====" >> memory_usage.txt
              free -h >> memory_usage.txt
              echo "" >> memory_usage.txt
              ps -eo pid,ppid,cmd,%mem,%cpu,rss,vsz --sort=-%mem | head -20 >> memory_usage.txt
              echo "" >> memory_usage.txt

              sleep 5
            done
          ) &
          MONITOR_PID=$!

          pytest -vvv -rx --numprocesses=${{ env.NUM_WORKERS }} --max-worker-restart=3 \
            --cov=echopype --cov-report=xml --log-cli-level=WARNING --disable-warnings

          TEST_EXIT_CODE=$?
          kill $MONITOR_PID || true
          wait $MONITOR_PID || true
          exit $TEST_EXIT_CODE

      - name: Plot memory usage
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          import matplotlib.pyplot as plt

          p = Path("memory_usage.csv")
          if not p.exists() or p.stat().st_size == 0:
              print("memory_usage.csv missing or empty")
              raise SystemExit(0)

          df = pd.read_csv(p)
          print("Columns detected:")
          print(df.columns)
          print(df.head())

          if "timestamp" not in df.columns or "rss_mb" not in df.columns:
              print("Expected columns not found")
              raise SystemExit(0)

          df["time_s"] = df["timestamp"] - df["timestamp"].iloc[0]

          plt.figure(figsize=(8, 4))
          plt.plot(df["time_s"], df["rss_mb"])
          plt.xlabel("Time (s)")
          plt.ylabel("RSS memory (MB)")
          plt.title("Memory usage during CI")
          plt.tight_layout()
          plt.savefig("memory_usage.png", dpi=150)
          PY

      - name: Show last memory samples
        if: always()
        run: |
          tail -n 20 memory_usage.csv || true
          tail -n 100 memory_usage.txt || true

      - name: Upload memory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-monitor-${{ matrix.python-version }}-${{ matrix.runs-on }}
          path: |
            memory_usage.csv
            memory_usage.txt
            memory_usage.png

      - name: Upload code coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          env_vars: RUNNER_OS,PYTHON_VERSION
          name: codecov-umbrella
          fail_ci_if_error: false

  test-windows:
    name: ${{ matrix.python-version }}--windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install deps (dev + pooch + s3)
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install "pooch>=1.8" fsspec s3fs
          python -m pip install pytest pytest-cov pytest-xdist pytest-mock

      - name: Install error reporter
        if: ${{ matrix.python-version == '3.13' }}
        run: python -m pip install pytest-github-actions-annotate-failures

      - name: Install echopype
        run: python -m pip install -e ".[plot]"

      - name: Pre-fetch all Pooch assets
        run: python -m pytest --collect-only -q

      - name: Start local services
        run: python .ci_helpers/setup-services-windows.py start

      - name: Running all Tests
        shell: pwsh
        env:
          PY_COLORS: "1"
        run: >
          python -m pytest -vvv -rx
          --numprocesses $env:NUM_WORKERS --max-worker-restart 3
          --cov echopype --cov-report xml
          --log-cli-level WARNING --disable-warnings

      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          env_vars: RUNNER_OS
          name: codecov-windows
          fail_ci_if_error: false

      - name: Teardown services
        if: always()
        run: python .ci_helpers/setup-services-windows.py stop
